<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>British English Text Speaker PRO</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    background:#f4f6f8;
}
textarea{
    width:100%;
    height:220px;
    padding:12px;
    font-size:16px;
}
select,button{
    margin:10px 5px 10px 0;
    padding:10px 15px;
    font-size:16px;
}
</style>
</head>
<body>

<h2>British English Text Speaker – Teacher Edition</h2>

<textarea id="textInput" placeholder="Paste English text here..."></textarea><br/>

<label>Voice:</label>
<select id="voiceSelect"></select>

<div>
    <button onclick="startSpeaking()">Speak</button>
    <button onclick="pauseSpeaking()">Pause</button>
    <button onclick="resumeSpeaking()">Resume</button>
    <button onclick="stopSpeaking()">Stop</button>
</div>

<script>
let voices = [];
let sentences = [];
let currentIndex = 0;
let isPaused = false;
let currentUtterance = null;

function loadVoices(){
    voices = speechSynthesis.getVoices().filter(v => v.lang === "en-GB");
    const select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    voices.forEach((v,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = v.name;
        select.appendChild(opt);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;

function splitIntoSentences(text){
    return text.match(/[^\.!\?]+[\.!\?]+/g) || [text];
}

function speakSentence(){
    if(currentIndex >= sentences.length) return;

    const voice = voices[document.getElementById("voiceSelect").value];
    currentUtterance = new SpeechSynthesisUtterance(sentences[currentIndex]);

    currentUtterance.voice = voice;
    currentUtterance.rate = 1;

    // női hang magasabb pitch
    if(voice.name.toLowerCase().includes("female") || voice.name.toLowerCase().includes("woman")){
        currentUtterance.pitch = 1.4;
    } else {
        currentUtterance.pitch = 1;
    }

    currentUtterance.onend = ()=>{
        if(!isPaused){
            currentIndex++;
            speakSentence();
        }
    };

    speechSynthesis.speak(currentUtterance);
}

function startSpeaking(){
    const text = document.getElementById("textInput").value;
    if(!text) return;

    speechSynthesis.cancel();
    sentences = splitIntoSentences(text);
    currentIndex = 0;
    isPaused = false;
    speakSentence();
}

function pauseSpeaking(){
    isPaused = true;
    speechSynthesis.cancel(); // megáll pontosan a mondat végén
}

function resumeSpeaking(){
    if(!isPaused) return;
    isPaused = false;
    speakSentence(); // pontosan onnan megy tovább
}

function stopSpeaking(){
    speechSynthesis.cancel();
    currentIndex = 0;
    isPaused = false;
}

loadVoices();
</script>

</body>
</html>
