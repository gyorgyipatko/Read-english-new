<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>English Text To Speech</title>
<style>
body{
  font-family: Arial;
  max-width:800px;
  margin:auto;
  padding:40px;
  background: linear-gradient(to right,#eef2ff,#e0e7ff);
}
textarea{
  width:100%;
  font-size:18px;
  padding:15px;
  border-radius:10px;
}
button{
  font-size:18px;
  padding:10px 20px;
  margin:10px 5px 0 0;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>English Text-to-Speech</h2>

<textarea id="text" rows="8" placeholder="Type or paste English text here..."></textarea>
<br>

<label>Voice: </label>
<select id="voiceSelect"></select>
<br>

<button onclick="speak()">Speak</button>
<button onclick="stopSpeak()">Stop</button>
<button onclick="resetSpeak()">Reset</button>

<script>
let voices = [];
let fullText = "";
let currentIndex = 0;
let utterance;

function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";
  voices.forEach(v=>{
    const opt=document.createElement("option");
    opt.value=v.name;
    opt.text=v.name;
    select.appendChild(opt);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
  if(speechSynthesis.speaking) return;

  fullText = document.getElementById("text").value;

  utterance = new SpeechSynthesisUtterance(fullText.substring(currentIndex));
  const voiceName = document.getElementById("voiceSelect").value;
  const voice = voices.find(v=>v.name===voiceName);
  if(voice) utterance.voice = voice;

  utterance.onboundary = function(event){
    if(event.name === "word"){
      currentIndex += event.charLength;
    }
  };

  speechSynthesis.speak(utterance);
}

function stopSpeak(){
  speechSynthesis.cancel();
}

function resetSpeak(){
  speechSynthesis.cancel();
  currentIndex = 0;
}

loadVoices();
</script>

</body>
</html>
