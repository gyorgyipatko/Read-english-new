<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>British English Text Speaker – Mobile</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    padding: 10px;
    background: #f4f6f8;
}
h2 {
    font-size: 1.5rem;
    margin-bottom: 10px;
}
textarea {
    width: 100%;
    height: 200px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: vertical;
}
select, button {
    margin: 10px 5px 10px 0;
    padding: 15px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
button {
    background-color: #007bff;
    color: white;
}
button:active {
    background-color: #0056b3;
}
.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
}
</style>
</head>
<body>

<h2>British English Text Speaker – Mobile Friendly</h2>

<textarea id="textInput" placeholder="Paste English text here..."></textarea><br/>

<label>Voice:</label>
<select id="voiceSelect"></select>

<div class="controls">
    <button onclick="startSpeaking()">Speak</button>
    <button onclick="pauseSpeaking()">Pause</button>
    <button onclick="resumeSpeaking()">Resume</button>
    <button onclick="stopSpeaking()">Stop</button>
</div>

<script>
let voices = [];
let sentences = [];
let currentIndex = 0;
let isPaused = false;
let currentUtterance = null;

// Betölti a brit angol hangokat
function loadVoices(){
    voices = speechSynthesis.getVoices().filter(v => v.lang === "en-GB");
    const select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    voices.forEach((v,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = v.name;
        select.appendChild(opt);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;

// Mondatokra bontás
function splitIntoSentences(text){
    return text.match(/[^\.!\?]+[\.!\?]+/g) || [text];
}

// Egy mondat felolvasása
function speakSentence(){
    if(currentIndex >= sentences.length) return;

    const voice = voices[document.getElementById("voiceSelect").value];
    currentUtterance = new SpeechSynthesisUtterance(sentences[currentIndex]);

    currentUtterance.voice = voice;
    currentUtterance.rate = 1;

    // női hang magasabb
    if(voice.name.toLowerCase().includes("female") || voice.name.toLowerCase().includes("woman")){
        currentUtterance.pitch = 1.4;
    } else {
        currentUtterance.pitch = 1;
    }

    currentUtterance.onend = ()=>{
        if(!isPaused){
            currentIndex++;
            speakSentence();
        }
    };

    speechSynthesis.speak(currentUtterance);
}

// Gombok funkciói
function startSpeaking(){
    const text = document.getElementById("textInput").value;
    if(!text) return;

    speechSynthesis.cancel();
    sentences = splitIntoSentences(text);
    currentIndex = 0;
    isPaused = false;
    speakSentence();
}

function pauseSpeaking(){
    isPaused = true;
    speechSynthesis.cancel();
}

function resumeSpeaking(){
    if(!isPaused) return;
    isPaused = false;
    speakSentence();
}

function stopSpeaking(){
    speechSynthesis.cancel();
    currentIndex = 0;
    isPaused = false;
}

// Inicializálás
loadVoices();
</script>

</body>
</html>
