<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>English Text To Speech</title>
<style>
body{
  font-family: Arial;
  max-width:800px;
  margin:auto;
  padding:40px;
  background: linear-gradient(to right,#eef2ff,#e0e7ff);
}
textarea{
  width:100%;
  font-size:18px;
  padding:15px;
  border-radius:10px;
}
button{
  font-size:18px;
  padding:10px 20px;
  margin:10px 5px 0 0;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>English Text-to-Speech</h2>

<textarea id="text" rows="8" placeholder="Type or paste English text here..."></textarea>

<br>

<label>Voice: </label>
<select id="voiceSelect"></select>

<br>

<button onclick="speak()">Speak</button>
<button onclick="stopSpeak()">Stop</button>
<button onclick="resetSpeak()">Reset</button>

<script>
let voices = [];
let position = 0;
let currentText = "";

function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";
  voices.forEach(v=>{
    const opt=document.createElement("option");
    opt.value=v.name;
    opt.text=v.name;
    select.appendChild(opt);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
  currentText = document.getElementById("text").value;
  const utter = new SpeechSynthesisUtterance(currentText.slice(position));
  const voiceName = document.getElementById("voiceSelect").value;
  const voice = voices.find(v=>v.name===voiceName);
  if(voice) utter.voice = voice;

  utter.onboundary = (e)=>{
    position += e.charIndex;
  }

  speechSynthesis.speak(utter);
}

function stopSpeak(){
  speechSynthesis.cancel();
}

function resetSpeak(){
  position = 0;
  speechSynthesis.cancel();
}

loadVoices();
</script>

</body>
</html>
