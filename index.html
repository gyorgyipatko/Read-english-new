<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>English Text To Speech</title>
<style>
body{
  font-family: Arial;
  max-width:800px;
  margin:auto;
  padding:40px;
  background: linear-gradient(to right,#eef2ff,#e0e7ff);
}
textarea{
  width:100%;
  font-size:18px;
  padding:15px;
  border-radius:10px;
  box-sizing: border-box;
}
button{
  font-size:18px;
  padding:10px 20px;
  margin:10px 5px 0 0;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>English Text-to-Speech</h2>

<textarea id="text" rows="8" placeholder="Type or paste English text here..."></textarea>
<br><br>

<label>Voice: </label>
<select id="voiceSelect"></select>
<br><br>

<button onclick="start()">Speak</button>
<button onclick="stop()">Stop</button>

<script>
let voices = [];
let sentences = [];
let currentSentence = 0;
let lastText = "";

// Betölti az angol hangokat
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";
  voices.forEach(v=>{
    const opt=document.createElement("option");
    opt.value=v.name;
    opt.text=v.name;
    select.appendChild(opt);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

// Mondatokra bontás
function splitSentences(text){
  return text.match(/[^\.!\?]+[\.!\?]+/g) || [text];
}

// Egy mondat felolvasása, majd automatikus továbblépés
function speakSentence(){
  if(currentSentence >= sentences.length){
    currentSentence = 0;   // ha végigért, vissza az elejére
    return;
  }

  const utterance = new SpeechSynthesisUtterance(sentences[currentSentence]);

  const voiceName = document.getElementById("voiceSelect").value;
  const voice = voices.find(v=>v.name===voiceName);
  if(voice) utterance.voice = voice;

  utterance.onend = () => {
    currentSentence++;
    speakSentence();
  };

  speechSynthesis.speak(utterance);
}

// Speak gomb
function start(){
  if(speechSynthesis.speaking) return;

  const text = document.getElementById("text").value.trim();
  if(!text) return;

  // Ha változott a szöveg → elölről kezdjük
  if(text !== lastText){
    sentences = splitSentences(text);
    currentSentence = 0;
    lastText = text;
  }

  speakSentence();
}

// Stop gomb
function stop(){
  speechSynthesis.cancel();
}

// Első betöltés
loadVoices();
</script>

</body>
</html>
